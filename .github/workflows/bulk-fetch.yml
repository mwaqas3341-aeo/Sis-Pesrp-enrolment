name: PESRP Nightly Sync

on:
  schedule:
    - cron: "0 20 * * *" # 1:00 AM PKT
  workflow_dispatch:
    inputs:
      reset:
        description: "Start fresh (delete checkpoint)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Handle Reset
        if: ${{ github.event.inputs.reset == 'true' }}
        run: rm -f data/checkpoint.json data/class_wise_enrollment.json

      - name: Run Fetch Script
        run: node scripts/run-bulk-fetch.js
        env:
          # You can store these securely in GitHub Repository Secrets
          PESRP_COOKIE: ${{ secrets.PESRP_COOKIE }}
          PESRP_CSRF: ${{ secrets.PESRP_CSRF }}

      - name: Commit and Push Data
        run: |
          git config user.name "Mastermind OS Bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: nightly enrollment update"
            git push
          fi
